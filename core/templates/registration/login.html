{% extends 'base.html' %}
{% block title %}Secure Login | Smart Invent{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg p-4">
                <div class="text-center mb-4">
                    <div class="icon-circle bg-amber-light mx-auto mb-3">
                        <i class="bi bi-shield-lock-fill text-amber fs-2"></i>
                    </div>
                    <h3 class="fw-bold">Welcome Back</h3>
                    <p class="text-muted small">Please enter your credentials to access the hub.</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label small fw-bold">{{ field.label }}</label>
                            {{ field }}
                        </div>
                    {% endfor %}
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-amber btn-lg">Sign In</button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <p class="small text-muted">Don't have an account? <a href="{% url 'register' %}" class="text-amber fw-bold text-decoration-none">Request Access</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
