{% extends 'base.html' %}
{% block title %}Confirm Delete{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6 text-center">
            <div class="card border-0 shadow-sm p-5">
                <i class="bi bi-exclamation-octagon text-danger display-1 mb-4"></i>
                <h2 class="fw-bold text-dark">Are you sure?</h2>
                <p class="text-secondary mb-4">
                    You are about to delete <strong>"{{ object.name }}"</strong>. This action cannot be undone.
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <button type="submit" class="btn btn-danger btn-lg px-4">Yes, Delete</button>
                        <a href="{% url 'product_list' %}" class="btn btn-outline-secondary btn-lg px-4">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
